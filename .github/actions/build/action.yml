name: Build
description: Build and push the application image
inputs:
  environment:
    description: Deployment environment
    required: true
  registry_url:
    description: Registry URL
    required: true
  registry_username:
    description: Registry username
    required: true
  registry_password:
    description: Registry password
    required: true
runs:
  using: composite
  steps:
    - uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry_url }}
        username: ${{ inputs.registry_username }}
        password: ${{ inputs.registry_password }}
    - uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        push: true
        tags: ${{ inputs.registry_url }}/lastliter/api:${{ inputs.environment }}-${{ github.run_number }}
