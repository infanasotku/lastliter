{% extends "sqladmin/layout.html" %}

{% block content_header %}{% endblock %}

{% block content %}
<style>
  .page-wrapper {
    height: 100vh;
    min-height: 0;
  }

  .page-body,
  .page-body > .container-fluid,
  .page-body .row-deck {
    height: 100%;
    margin: 0;
    padding: 0;
  }

  .station-map-frame {
    display: block;
    width: 100%;
    height: 100%;
    border: 0;
  }
</style>

<iframe
  class="station-map-frame"
  src="{{ map_url }}"
  title="Stations map"
></iframe>
{% endblock %}
