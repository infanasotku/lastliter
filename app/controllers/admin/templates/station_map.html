{% extends "sqladmin/layout.html" %}

{% block content_header %}{% endblock %}

{% block content %}
<style>
  .page-wrapper {
    height: 100vh;
    min-height: 0;
    overflow: hidden;
  }

  .page-wrapper > .container-fluid {
    display: none;
  }

  .page-body {
    flex: 1 1 auto;
    min-height: 0;
    margin: 0 !important;
  }

  .page-body > .container-fluid,
  .page-body .row-deck {
    width: 100%;
    max-width: none;
    height: 100%;
    margin: 0 !important;
    padding: 0 !important;
  }

  .page-body .row-deck {
    --tblr-gutter-x: 0;
    --tblr-gutter-y: 0;
  }

  .page-body .row-deck > * {
    margin: 0 !important;
    padding: 0 !important;
  }

  .station-map-frame {
    display: block;
    flex: 1 1 auto;
    width: 100%;
    height: 100%;
    border: 0;
  }
</style>

<iframe
  id="station-map-frame"
  class="station-map-frame"
  src="{{ map_url }}"
  title="Stations map"
></iframe>

<script id="station-map-bridge-config" type="application/json">
  {{ map_bridge_config | tojson }}
</script>
<script>
  (() => {
    const frame = document.getElementById("station-map-frame");
    const { mapOrigin, context, stationDetailsUrls } = JSON.parse(
      document.getElementById("station-map-bridge-config").textContent,
    );

    const sendContext = () => {
      frame.contentWindow?.postMessage(context, mapOrigin);
    };

    window.addEventListener("message", (event) => {
      if (event.origin !== mapOrigin || event.source !== frame.contentWindow) {
        return;
      }

      if (
        event.data?.type === "lastliter:map-ready" &&
        event.data?.version === context.version
      ) {
        sendContext();
        return;
      }

      if (
        event.data?.type !== "lastliter:station-open" ||
        event.data?.version !== context.version ||
        typeof event.data?.stationId !== "string"
      ) {
        return;
      }

      const detailsUrl = stationDetailsUrls[event.data.stationId];
      if (typeof detailsUrl === "string") {
        window.location.assign(detailsUrl);
      }
    });
  })();
</script>
{% endblock %}
