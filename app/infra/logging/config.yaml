version: 1
disable_existing_loggers: False
formatters:
  default:
    "()": app.infra.logging.extras.DefaultLogFormatter
    format: "%(levelprefix)s [%(asctime)s] [%(correlation_id)s] %(message)s"
    use_colors: null
    datefmt: "%d-%m-%Y %H:%M:%S"
  default-with-process:
    format: "%(levelprefix)s [%(asctime)s] [%(processName)s:%(process)d] [%(correlation_id)s] %(message)s"
  access:
    "()": app.infra.logging.extras.AccessLogFormatter
    format: '%(levelprefix)s [%(asctime)s] [%(correlation_id)s] %(client_addr)s - "%(request_line)s" %(status_code)s'
    datefmt: "%d-%m-%Y %H:%M:%S"
filters:
  correlation_id:
    "()": app.infra.logging.extras.CorrelationIdFilter
handlers:
  default:
    formatter: default
    class: logging.StreamHandler
    stream: ext://sys.stderr
    filters: [correlation_id]
  access:
    formatter: access
    class: logging.StreamHandler
    stream: ext://sys.stdout
    filters: [correlation_id]
loggers:
  uvicorn:
    level: INFO
    handlers:
      - default
    propagate: no
  uvicorn.error:
    level: INFO
  uvicorn.access:
    level: INFO
    handlers:
      - access
    propagate: no
